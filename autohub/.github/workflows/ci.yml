name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests (Vitest) ──────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: autohub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/autohub_test
      REDIS_URL: redis://localhost:6379
      NEXTAUTH_SECRET: ci-test-secret-32-chars-minimum!!
      ENCRYPTION_KEY: ci-test-encryption-key-32-chars!!
      JWT_SECRET: ci-test-jwt-secret
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      STRIPE_PRO_PRICE_ID: price_placeholder
      STRIPE_CREDITS_100_PRICE_ID: price_placeholder
      STRIPE_CREDITS_500_PRICE_ID: price_placeholder
      STRIPE_CREDITS_1000_PRICE_ID: price_placeholder
      RESEND_API_KEY: re_placeholder
      RESEND_FROM_EMAIL: noreply@autohub.fun
      AUTOHUB_WEB_URL: http://localhost:3000
      NODE_ENV: test
      PORT: 4000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Run migrations
        run: npx drizzle-kit migrate
        working-directory: apps/api

      - name: Run unit tests
        run: pnpm test

  # ── Type check ──────────────────────────────────────────────────────────
  type-check:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check API
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Type check Web
        run: npx tsc --noEmit
        working-directory: apps/web

  # ── E2E tests (Playwright) ──────────────────────────────────────────────
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: autohub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/autohub_test
      REDIS_URL: redis://localhost:6379
      NEXTAUTH_SECRET: ci-test-secret-32-chars-minimum!!
      NEXTAUTH_URL: http://localhost:3000
      ENCRYPTION_KEY: ci-test-encryption-key-32-chars!!
      JWT_SECRET: ci-test-jwt-secret
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      STRIPE_PRO_PRICE_ID: price_placeholder
      STRIPE_CREDITS_100_PRICE_ID: price_placeholder
      STRIPE_CREDITS_500_PRICE_ID: price_placeholder
      STRIPE_CREDITS_1000_PRICE_ID: price_placeholder
      RESEND_API_KEY: re_placeholder
      RESEND_FROM_EMAIL: noreply@autohub.fun
      AUTOHUB_WEB_URL: http://localhost:3000
      AUTOHUB_CORS_ORIGINS: http://localhost:3000
      AUTOHUB_API_URL: http://localhost:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NODE_ENV: test
      PORT: 4000
      # Playwright
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      E2E_TEST_EMAIL: e2e@autohub.test
      E2E_TEST_PASSWORD: e2epassword123
      E2E_ADMIN_EMAIL: admin-e2e@autohub.test
      E2E_ADMIN_PASSWORD: e2epassword123

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run migrations
        run: npx drizzle-kit migrate
        working-directory: apps/api

      - name: Seed E2E test users
        run: npx tsx src/scripts/e2e-seed.ts
        working-directory: apps/api

      - name: Build API
        run: pnpm build
        working-directory: apps/api

      - name: Start API server
        run: node dist/index.js &
        working-directory: apps/api

      - name: Wait for API to be ready
        run: npx wait-on http-get://localhost:4000/health --timeout 30000

      - name: Run E2E tests (authenticated + unauthenticated)
        run: pnpm e2e --project=authenticated --project=unauthenticated --project=authenticated-admin
        working-directory: apps/web

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ── Production smoke tests ──────────────────────────────────────────────
  smoke:
    name: Production smoke tests
    runs-on: ubuntu-latest
    # Only run on push to main (after deploy)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [unit-tests, e2e]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Wait for Vercel deploy to propagate
        run: sleep 30

      - name: Run production smoke tests
        run: pnpm e2e --project=smoke
        working-directory: apps/web
        env:
          SMOKE_BASE_URL: https://www.autohub.fun

      - name: Upload smoke test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: apps/web/playwright-report/
          retention-days: 7
